<svg viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-labelledby="t d" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <title id="t">Bauhaus UI</title>

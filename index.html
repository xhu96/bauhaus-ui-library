<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Bauhaus UI — geometric React components</title>
    <meta
      name="description"
      content="A bold, geometric React + TypeScript component library inspired by the Bauhaus movement."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Bauhaus UI — geometric React components" />
    <meta
      property="og:description"
      content="A bold, geometric React + TypeScript component library inspired by the Bauhaus movement."
    />
    <meta
      property="og:image"
      content="https://raw.githubusercontent.com/xhu96/bauhaus-ui-library/main/assets/banner.svg"
    />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Set the theme before paint to avoid a flash of the wrong theme.
      try {
        var t = localStorage.getItem('bauhaus-theme')
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark')
        }
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
